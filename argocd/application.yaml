apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docuqa-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bittush8789/Groq-PDF-Assistant.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: docuqa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
