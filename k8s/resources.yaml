apiVersion: v1
kind: Service
metadata:
  name: docuqa-service
  namespace: docuqa
spec:
  selector:
    app: docuqa
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docuqa-ingress
  namespace: docuqa
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: docuqa.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: docuqa-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: docuqa-hpa
  namespace: docuqa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: streamlit-app
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: docuqa-config
  namespace: docuqa
data:
  USE_GROQ: "True"
  GROQ_MODEL: "llama-3.3-70b-versatile"
  LLM_MODEL: "models/gemini-2.0-flash"
---
apiVersion: v1
kind: Secret
metadata:
  name: docuqa-secrets
  namespace: docuqa
type: Opaque
data:
  # Base64 encoded keys (placeholder values)
  GEMINI_API_KEY: Q0hBTkdFX01F
  GROQ_API_KEY: Q0hBTkdFX01F
